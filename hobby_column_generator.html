<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホビー不動産 コラムジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  :root { --ink:#1a1a18;--cream:#f5f0e8;--accent:#c4552a;--accent-light:#e8724a;--muted:#8a8070;--border:#d4cabb;--success:#4a7c5a; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.7;}
  header{background:var(--ink);padding:20px 32px;display:flex;align-items:baseline;gap:16px;position:sticky;top:0;z-index:100;}
  header h1{font-family:'Noto Serif JP',serif;font-size:18px;color:var(--cream);letter-spacing:.05em;font-weight:600;}
  header span{font-size:11px;color:var(--muted);letter-spacing:.1em;}
  .layout{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 61px);}
  .input-panel{padding:32px;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 61px);}
  .output-panel{padding:32px;overflow-y:auto;max-height:calc(100vh - 61px);display:flex;flex-direction:column;}
  .section-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .section-divider{font-size:10px;letter-spacing:.12em;color:var(--muted);margin:24px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .field-group{margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink);margin-bottom:5px;letter-spacing:.02em;}
  label .opt{font-weight:300;color:var(--muted);font-size:11px;margin-left:4px;}
  input[type=text],textarea,select{width:100%;background:white;border:1px solid var(--border);border-radius:4px;padding:9px 12px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s;resize:vertical;}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{min-height:72px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .writer-btns{display:flex;gap:8px;}
  .writer-btn{flex:1;padding:9px 8px;background:white;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;color:var(--muted);}
  .writer-btn.active{background:var(--ink);color:white;border-color:var(--ink);}
  .writer-btn:hover:not(.active){border-color:var(--ink);color:var(--ink);}
  .length-control{display:flex;gap:8px;}
  .length-btn{flex:1;padding:8px;background:white;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;color:var(--muted);}
  .length-btn.active{background:var(--ink);color:white;border-color:var(--ink);}
  .generate-btn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.05em;transition:background .15s;margin-top:24px;}
  .generate-btn:hover{background:var(--accent-light);}
  .generate-btn:disabled{background:var(--muted);cursor:not-allowed;}
  .output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .output-meta{font-size:11px;color:var(--muted);}
  .copy-btn{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;color:var(--ink);transition:all .15s;}
  .copy-btn:hover{border-color:var(--ink);}
  .copy-btn.copied{border-color:var(--success);color:var(--success);}
  .output-box{flex:1;background:white;border:1px solid var(--border);border-radius:4px;padding:24px;min-height:400px;overflow:auto;word-break:break-all;overflow-wrap:break-word;}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:300px;color:var(--muted);text-align:center;gap:12px;}
  .placeholder-icon{font-size:32px;opacity:.3;}
  .placeholder p{font-size:13px;line-height:1.6;}
  .result-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--ink);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);line-height:1.5;word-break:break-all;}
  .result-body{font-size:13.5px;line-height:2;color:var(--ink);white-space:pre-wrap;word-break:break-all;overflow-wrap:break-word;}
  .loading-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:40px;}
  .loading-dots span{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:dot-bounce 1.2s infinite ease-in-out;}
  .loading-dots span:nth-child(2){animation-delay:.2s;}
  .loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-bounce{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}
  .char-count{margin-top:12px;text-align:right;font-size:11px;color:var(--muted);}
  .error-msg{color:var(--accent);font-size:13px;padding:16px;background:#fdf0ec;border-radius:4px;border:1px solid #f0c4b8;}
  .regenerate-bar{display:flex;gap:10px;margin-top:16px;}
  .regen-btn{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;color:var(--ink);transition:all .15s;}
  .regen-btn:hover{border-color:var(--accent);color:var(--accent);}
  @media(max-width:900px){.layout{grid-template-columns:1fr;}.input-panel{max-height:none;border-right:none;border-bottom:1px solid var(--border);}.output-panel{max-height:none;}.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <h1>ホビー不動産 コラムジェネレーター</h1>
  <span>HOBBY ESTATE</span>
</header>
<div class="layout">
  <div class="input-panel">
    <div class="section-label">物件情報を入力</div>

    <div class="two-col">
      <div class="field-group">
        <label>不動産カテゴリー</label>
        <select id="category">
          <option value="">選択</option>
          <option value="売買">売買</option>
          <option value="賃貸">賃貸</option>
        </select>
      </div>
      <div class="field-group">
        <label>物件種別 <span class="opt">必須</span></label>
        <select id="type">
          <option value="">選択</option>
          <option value="売買マンション">売買マンション</option>
          <option value="売買戸建">売買戸建</option>
          <option value="売土地">売土地</option>
          <option value="賃貸マンション">賃貸マンション</option>
          <option value="賃貸アパート">賃貸アパート</option>
          <option value="賃貸戸建">賃貸戸建</option>
          <option value="賃貸事務所">賃貸事務所</option>
          <option value="賃貸店舗">賃貸店舗</option>
          <option value="宿・民泊">宿・民泊</option>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label>エリア・住所 <span class="opt">あれば</span></label>
      <input type="text" id="address" placeholder="例：港区南麻布、世田谷区駒沢">
    </div>

    <div class="field-group">
      <label>交通（最寄り駅・徒歩）</label>
      <input type="text" id="access" placeholder="例：南北線「麻布十番」駅 徒歩9分">
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>価格・賃料</label>
        <input type="text" id="price" placeholder="例：21,800万円 / 月15万円">
      </div>
      <div class="field-group">
        <label>間取り</label>
        <input type="text" id="madori" placeholder="例：2LDK">
      </div>
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>何年築</label>
        <input type="text" id="built" placeholder="例：1995年築">
      </div>
      <div class="field-group">
        <label>構造</label>
        <select id="structure">
          <option value="">選択</option>
          <option value="鉄骨鉄筋コンクリート造">鉄骨鉄筋コンクリート造</option>
          <option value="鉄筋コンクリート造">鉄筋コンクリート造</option>
          <option value="鉄骨造">鉄骨造</option>
          <option value="木造">木造</option>
          <option value="軽量鉄骨造">軽量鉄骨造</option>
        </select>
      </div>
    </div>

    <div class="section-divider">担当者</div>
    <div class="field-group">
      <label>担当者を選択</label>
      <div class="writer-btns">
        <button class="writer-btn active" data-writer="murota" onclick="setWriter(this)">室田</button>
        <button class="writer-btn" data-writer="saeki" onclick="setWriter(this)">佐伯</button>
        <button class="writer-btn" data-writer="tamai" onclick="setWriter(this)">玉井</button>
        <button class="writer-btn" data-writer="morioka" onclick="setWriter(this)">森岡</button>
      </div>
    </div>

    <div class="section-divider">コラムの素材</div>

    <div class="field-group">
      <label>一番の「惚れポイント」 <span class="opt">必須</span></label>
      <textarea id="appeal" placeholder="この物件で一番グッときた場所・瞬間・理由を教えてください。
例：ソファに座ると緑と空がちょうど半々に見える、神社の境内の中にあって帰るたびに達成感がある"></textarea>
    </div>
    <div class="field-group">
      <label>内装・空間の特徴 <span class="opt">あれば</span></label>
      <textarea id="interior" placeholder="素材、天井高、光、特徴的なディテールなど
例：オーク無垢フロア、天高3m、南東角部屋で光がたっぷり、造作キッチン"></textarea>
    </div>
    <div class="field-group">
      <label>眺望・自然環境 <span class="opt">あれば</span></label>
      <input type="text" id="view" placeholder="例：公園VIEWでカーテンいらず、多摩川河川敷まで2分">
    </div>
    <div class="field-group">
      <label>間取りの面白ポイント・使い方提案 <span class="opt">あれば</span></label>
      <textarea id="layout_idea" placeholder="例：ワークスペースが独立してて共働きに◎、1階だけど人目がなくて快適"></textarea>
    </div>
    <div class="field-group">
      <label>街・エリアの印象 <span class="opt">あれば</span></label>
      <textarea id="area_note" placeholder="個人的に知ってるお気に入りのお店、街の空気感、ローカルな情報など"></textarea>
    </div>
    <div class="field-group">
      <label>正直なネック <span class="opt">あれば</span></label>
      <input type="text" id="drawback" placeholder="例：駅から12分、エレベーターなし4階、バランス釜">
    </div>
    <div class="field-group">
      <label>どんな人に向くか <span class="opt">あれば</span></label>
      <input type="text" id="target" placeholder="例：アウトドア好きのカップル、在宅ワーカー、古さより個性重視の方">
    </div>
    <div class="field-group">
      <label>目標文字数</label>
      <div class="length-control">
        <button class="length-btn" data-val="600" onclick="setLength(this)">600字</button>
        <button class="length-btn active" data-val="900" onclick="setLength(this)">900字</button>
        <button class="length-btn" data-val="1200" onclick="setLength(this)">1200字</button>
      </div>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generateColumn()">コラムを生成する</button>
  </div>

  <div class="output-panel">
    <div class="output-header">
      <div class="section-label" style="margin-bottom:0">生成結果</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="output-meta" id="charCountHeader"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyText()" style="display:none">コピー</button>
      </div>
    </div>
    <div class="output-box" id="outputBox">
      <div class="placeholder">
        <div class="placeholder-icon">✍️</div>
        <p>左のフォームに物件の情報を入力して<br>「コラムを生成する」をクリックしてください。</p>
        <p style="font-size:11px;color:var(--muted)">必須項目は「物件種別」と「惚れポイント」の2つだけ。<br>あとはあるだけ入れれば精度が上がります。</p>
      </div>
    </div>
    <div class="regenerate-bar" id="regenBar" style="display:none">
      <button class="regen-btn" onclick="generateColumn()">↺ 再生成</button>
      <button class="regen-btn" onclick="generateColumn('shorter')">もっと短く</button>
      <button class="regen-btn" onclick="generateColumn('longer')">もっと長く</button>
    </div>
  </div>
</div>

<script>
let targetLength = 900;
let currentWriter = 'murota';
let currentTitle = '';
let currentBody = '';

const SAMPLE_COLUMNS = [
  "一生賃貸暮らしはないよね、と思いつつ、とはいえ仕事や家族構成が変わるかもしれないし、多額のローンを背負うのはちょっと違うかも。みたいな方に、ちょっと都心から距離をおくことで、無理のない負担で結構リアルな選択肢が手に入るかもしれません、という物件のご提案。    田園都市線で渋谷から揺られること約20分の場所にある梶が谷駅から歩くこと7分。一人暮らし〜DINKSにハマりの良さそうな1LDKの間取りです。    表記では約11.2帖ながら寝室との間仕切りをガラス建具にしているためかなり開放的な印象のあるリビング。長方形の形が使い勝手よくて、リビングとダイニングそれぞれゆったりと確保できます。",
  "目黒区に富士山があることをご存知でしょうか？    246号線の大橋の信号から氷川神社へと上がる階段の脇に、「目黒富士登山口」なる標識があります。    この登山口から1分弱の登山を開始すると、みるみるうちに三合目、五合目、そして「目黒富士山頂上」の標識が。    日々、帰宅の度に得られる頂上での達成感。そうです、このアパート、この頂上に立つ氷川神社の境内にあるのです。    ということはもちろん、窓の外にはワッサワッサと緑VIEW。246号線からはかなり上ったおかげで騒音は気にならず、落ち着く住環境です。    いわゆる木造賃貸アパートなので、室内に過度な期待は禁物ですが、色々とリフォームされているため室内はきれいな印象。    木造アパートに抵抗ない方は、ぜひ。",
  "エントランスホールでは音楽が流れ、まるでホテルのような雰囲気で迎えられる赤茶色の重厚感のあるマンションの一室です。    リビングのドアを開けると目に飛び込んでくるのはRがかった2つのカウンター。曲線に誘導されるようにバルコニーへと視線をやると、緑豊かな街並みと、遠くには新宿副都心のビル群が臨めます。    まるでホテルに泊まるように暮らす都心居住。グッと来た方はぜひ。",
  "大岡山の閑静な住宅街に立つ、ビーフンデザインの設計による小さな集合住宅です。    無垢フローリングと白壁でシンプルにまとめた空間は、大きなワンルームながらゾーンごとに役割を与えられ、どこになにを配置すればいいのか悩まない間取りです。    カップルでも十分にお住まいいただける広さがありますので、二人暮らしにもぜひ。",
  "六本木駅2分という好立地に建つ、2010年に一棟丸ごとリノベーションにより生まれ変わったこのオフィスです。    ざっくりと配管剥き出しの天井を塗装し、床はナラ材の無垢フローリング。シンプルな空間はどんな業種にも合いそうです。    六本木と聞くとどうしても猥雑な空間をイメージしますが、この物件はシンプル、ナチュラル、至って快適。このギャップが一番の魅力だと思います。",
  "紅葉した桜の木の脇を、ちょろちょろと小川が流れる、ほのぼのとした緑道。そんな癒しの空間を目の前に、こちらの物件は立っています。    まず緑道から部屋へのアプローチが、もう素敵です。戦前のものだという立派な門から入り、飛び石の小道を数歩進むと、玄関へたどり着きます。    環境的にも物件的にも、「井の頭線沿いらしい暮らし」を探している方に合いそうです。"
];

const WRITER_PROMPTS = {
  murota: {
    name: '室田啓介',
    prompt: `あなたは不動産仲介会社「ホビー不動産」の代表、室田啓介の文体でコラムを書くライターです。
室田さんは東京R不動産で18年のキャリアを持ち、「不動産をホビーに」をコンセプトに活動しています。

【室田啓介の文体ルール】
- 一人称は「僕」
- 会話口調ではあるが、品のある読み物として成立する文体を保つ。「〜っぽい」「〜みたいな」などの砕けすぎた表現は使わない
- 文末は「〜です」「〜ます」で統一する。「〜だ」「〜である」「〜だろう」「〜ではないか」などの体言止めや断定調は使わない
- 物件の「惚れポイント」を最初か早い段階で読者に体験させる
- 素材名・寸法・具体的な体感を使って描写する（「緑と空がちょうど半々に見えます」「ソファに腰掛けると」など）
- ネックは正直に書くが、ポジティブに転換するか、そのまま受け入れてもらう形で書く
- 「どんな人向きか」は決めつけすぎず、でも具体的に
- 街の話は個人的なエピソードや発見を交えて
- 締め方は「〜な方はぜひ。」「グッと来た方はぜひ。」などシンプルに
- 段落は短め。一段落2〜4文くらい
- タイトルは物件の本質を掴んだキャッチコピー（例：「目黒富士山頂アパート！？」「だって、西荻だもの」「合板×合板×合板」）`
  },
  saeki: {
    name: '佐伯',
    prompt: `あなたは不動産仲介会社「ホビー不動産」スタッフ、佐伯の文体でコラムを書くライターです。
※佐伯さんの文体データは準備中です。現在は室田啓介のスタイルに準じて書いてください。
- 一人称は「僕」
- 品のある会話口調。「〜です」「〜ます」で統一する
- 物件の「惚れポイント」を早い段階で読者に体験させる
- ネックは正直に、でもポジティブに
- 締め方はシンプルに`
  },
  tamai: {
    name: '玉井',
    prompt: `あなたは不動産仲介会社「ホビー不動産」スタッフ、玉井の文体でコラムを書くライターです。
※玉井さんの文体データは準備中です。現在は室田啓介のスタイルに準じて書いてください。
- 一人称は「私」または「僕」
- 品のある会話口調。「〜です」「〜ます」で統一する
- 物件の「惚れポイント」を早い段階で読者に体験させる
- ネックは正直に、でもポジティブに
- 締め方はシンプルに`
  },
  morioka: {
    name: '森岡',
    prompt: `あなたは不動産仲介会社「ホビー不動産」スタッフ、森岡の文体でコラムを書くライターです。
※森岡さんの文体データは準備中です。現在は室田啓介のスタイルに準じて書いてください。
- 一人称は「私」または「僕」
- 品のある会話口調。「〜です」「〜ます」で統一する
- 物件の「惚れポイント」を早い段階で読者に体験させる
- ネックは正直に、でもポジティブに
- 締め方はシンプルに`
  }
};

function setWriter(btn) {
  document.querySelectorAll('.writer-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentWriter = btn.dataset.writer;
}

function buildSystemPrompt() {
  const examples = SAMPLE_COLUMNS.join('\n\n---\n\n');
  const writer = WRITER_PROMPTS[currentWriter] || WRITER_PROMPTS.murota;
  return `${writer.prompt}

【文体サンプル（室田啓介の実際のコラム）】
${examples}

【生成ルール】
- タイトルは1行のみ（「タイトル：」というラベルをつけて）
- 本文の前に「本文：」というラベルをつけて
- 指定文字数はあくまで目安。内容に合わせて±15%は許容
- 価格や条件の羅列はしない（コラムはあくまで読み物として書く）`;
}

function buildUserPrompt(overrideLengthMode) {
  const v = id => document.getElementById(id).value;
  let length = targetLength;
  if (overrideLengthMode === 'shorter') length = Math.max(500, targetLength - 300);
  if (overrideLengthMode === 'longer') length = Math.min(1500, targetLength + 300);
  const writer = WRITER_PROMPTS[currentWriter] || WRITER_PROMPTS.murota;

  let p = `以下の物件情報をもとに、${writer.name}らしいコラムを${length}字前後で書いてください。\n\n【物件情報】\n`;
  if (v('category')) p += `カテゴリー：${v('category')}\n`;
  if (v('type')) p += `種別：${v('type')}\n`;
  if (v('address')) p += `エリア：${v('address')}\n`;
  if (v('access')) p += `交通：${v('access')}\n`;
  if (v('price')) p += `価格・賃料：${v('price')}\n`;
  if (v('madori')) p += `間取り：${v('madori')}\n`;
  if (v('built')) p += `築年：${v('built')}\n`;
  if (v('structure')) p += `構造：${v('structure')}\n`;
  p += `\n【コラムの素材】\n`;
  if (v('appeal')) p += `惚れポイント：${v('appeal')}\n`;
  if (v('interior')) p += `内装・空間：${v('interior')}\n`;
  if (v('view')) p += `眺望・環境：${v('view')}\n`;
  if (v('layout_idea')) p += `間取りの面白さ：${v('layout_idea')}\n`;
  if (v('area_note')) p += `街・エリア：${v('area_note')}\n`;
  if (v('drawback')) p += `ネック：${v('drawback')}\n`;
  if (v('target')) p += `向いている人：${v('target')}\n`;
  return p;
}

function setLength(btn) {
  document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  targetLength = parseInt(btn.dataset.val);
}

async function generateColumn(overrideLengthMode) {
  const type = document.getElementById('type').value;
  const appeal = document.getElementById('appeal').value;
  if (!type && !appeal) {
    document.getElementById('outputBox').innerHTML = '<div class="error-msg">「物件種別」と「惚れポイント」は必須です。</div>';
    return;
  }
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('charCountHeader').textContent = '';
  document.getElementById('regenBar').style.display = 'none';
  document.getElementById('outputBox').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  try {
    const response = await fetch('https://hobby.estate/proxy.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        system: buildSystemPrompt(),
        messages: [{ role: 'user', content: buildUserPrompt(overrideLengthMode) }]
      })
    });
    const data = await response.json();
    const text = (data.content && data.content[0] && data.content[0].text)
      ? data.content[0].text
      : (data.error ? '【エラー】' + data.error.message : '');

    const titleMatch = text.match(/タイトル[：:]\s*(.+)/);
    const bodyMatch = text.match(/本文[：:]\s*([\s\S]+)/);
    currentTitle = titleMatch ? titleMatch[1].trim() : '';
    currentBody = bodyMatch ? bodyMatch[1].trim() : text;
    if (!currentBody) currentBody = text;

    const charCount = (currentTitle + currentBody).length;
    let html = '';
    if (currentTitle) html += `<div class="result-title">${esc(currentTitle)}</div>`;
    html += `<div class="result-body">${esc(currentBody)}</div>`;
    html += `<div class="char-count">${charCount}字</div>`;
    document.getElementById('outputBox').innerHTML = html;
    document.getElementById('charCountHeader').textContent = `${charCount}字`;
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('regenBar').style.display = 'flex';
  } catch (err) {
    document.getElementById('outputBox').innerHTML = `<div class="error-msg">エラーが発生しました。<br><small>${err.message}</small></div>`;
  }
  btn.disabled = false; btn.textContent = 'コラムを生成する';
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function copyText() {
  const text = (currentTitle ? currentTitle + '\n\n' : '') + currentBody;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
