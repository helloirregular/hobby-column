<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホビー不動産 コラムジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a18;
    --cream: #f5f0e8;
    --warm: #e8e0d0;
    --accent: #c4552a;
    --accent-light: #e8724a;
    --muted: #8a8070;
    --border: #d4cabb;
    --success: #4a7c5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.7;
  }

  header {
    background: var(--ink);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: var(--cream);
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 61px);
  }

  /* LEFT PANEL */
  .input-panel {
    padding: 32px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 61px);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .field-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  label .optional {
    font-weight: 300;
    color: var(--muted);
    font-size: 11px;
    margin-left: 4px;
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  textarea {
    min-height: 80px;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .length-control {
    display: flex;
    gap: 8px;
  }

  .length-btn {
    flex: 1;
    padding: 8px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--muted);
  }

  .length-btn.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
    margin-top: 24px;
  }

  .generate-btn:hover { background: var(--accent-light); }
  .generate-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* RIGHT PANEL */
  .output-panel {
    padding: 32px;
    overflow-y: auto;
    max-height: calc(100vh - 61px);
    display: flex;
    flex-direction: column;
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .output-meta {
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--ink); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }

  .output-box {
    flex: 1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    min-height: 400px;
    position: relative;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    color: var(--muted);
    text-align: center;
    gap: 12px;
  }

  .placeholder-icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .placeholder p {
    font-size: 13px;
    line-height: 1.6;
  }

  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }

  .result-body {
    font-size: 13.5px;
    line-height: 2;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: dot-bounce 1.2s infinite ease-in-out;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .char-count {
    margin-top: 12px;
    text-align: right;
    font-size: 11px;
    color: var(--muted);
  }

  .error-msg {
    color: var(--accent);
    font-size: 13px;
    padding: 16px;
    background: #fdf0ec;
    border-radius: 4px;
    border: 1px solid #f0c4b8;
  }

  .regenerate-bar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .regen-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }

  .regen-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .input-panel { max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    .output-panel { max-height: none; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>ホビー不動産 コラムジェネレーター</h1>
  <span>HOBBY ESTATE</span>
</header>

<div class="layout">
  <!-- INPUT -->
  <div class="input-panel">
    <div class="section-label">物件情報を入力</div>

    <div class="field-group">
      <label>物件種別 <span class="optional">必須</span></label>
      <select id="type">
        <option value="">選択してください</option>
        <option value="賃貸マンション">賃貸マンション</option>
        <option value="賃貸アパート">賃貸アパート</option>
        <option value="売買マンション">売買マンション</option>
        <option value="戸建（売買）">戸建（売買）</option>
        <option value="戸建（賃貸）">戸建（賃貸）</option>
        <option value="店舗・オフィス">店舗・オフィス</option>
        <option value="宿・民泊">宿・民泊</option>
      </select>
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>エリア・最寄り駅</label>
        <input type="text" id="area" placeholder="例：世田谷区駒沢、駒沢大学駅3分">
      </div>
      <div class="field-group">
        <label>間取り・面積</label>
        <input type="text" id="layout" placeholder="例：1LDK 55㎡">
      </div>
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>築年数・構造</label>
        <input type="text" id="age" placeholder="例：築32年・RC造">
      </div>
      <div class="field-group">
        <label>価格・賃料</label>
        <input type="text" id="price" placeholder="例：4,500万円 / 月15万円">
      </div>
    </div>

    <div class="field-group">
      <label>一番の「惚れポイント」 <span class="optional">必須</span></label>
      <textarea id="appeal" placeholder="この物件で一番グッときた場所・瞬間・理由を教えてください。
例：ソファに座ると緑と空がちょうど半々に見えて気持ちよかった、神社の境内の中にあって帰るたびに達成感がある、など"></textarea>
    </div>

    <div class="field-group">
      <label>内装・空間の特徴 <span class="optional">あれば</span></label>
      <textarea id="interior" placeholder="素材、天井高、光、特徴的なディテールなど
例：オーク無垢フロア、天高3m、南東角部屋で光がたっぷり、造作キッチンがかっこいい"></textarea>
    </div>

    <div class="field-group">
      <label>眺望・自然環境 <span class="optional">あれば</span></label>
      <input type="text" id="view" placeholder="例：公園VIEWでカーテンいらず、多摩川河川敷まで2分">
    </div>

    <div class="field-group">
      <label>間取りの面白ポイント・使い方提案 <span class="optional">あれば</span></label>
      <textarea id="layout_idea" placeholder="例：ワークスペースが独立してて共働きに◎、1階だけど人目がなくて快適、など"></textarea>
    </div>

    <div class="field-group">
      <label>街・エリアの印象 <span class="optional">あれば</span></label>
      <textarea id="area_note" placeholder="個人的に知ってるお気に入りのお店、街の空気感、ローカルな情報など"></textarea>
    </div>

    <div class="field-group">
      <label>正直なネック <span class="optional">あれば</span></label>
      <input type="text" id="drawback" placeholder="例：駅から12分、エレベーターなし4階、バランス釜">
    </div>

    <div class="field-group">
      <label>どんな人に向くか <span class="optional">あれば</span></label>
      <input type="text" id="target" placeholder="例：アウトドア好きのカップル、在宅ワーカー、古さより個性重視の方">
    </div>

    <div class="field-group">
      <label>目標文字数</label>
      <div class="length-control">
        <button class="length-btn" data-val="600" onclick="setLength(this)">600字</button>
        <button class="length-btn active" data-val="900" onclick="setLength(this)">900字</button>
        <button class="length-btn" data-val="1200" onclick="setLength(this)">1200字</button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateColumn()">
      コラムを生成する
    </button>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel">
    <div class="output-header">
      <div class="section-label" style="margin-bottom:0">生成結果</div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="output-meta" id="charCountHeader"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyText()" style="display:none">コピー</button>
      </div>
    </div>

    <div class="output-box" id="outputBox">
      <div class="placeholder">
        <div class="placeholder-icon">✍️</div>
        <p>左のフォームに物件の情報を入力して<br>「コラムを生成する」をクリックしてください。</p>
        <p style="font-size:11px;color:var(--muted)">必須項目は「物件種別」と「惚れポイント」の2つだけ。<br>あとはあるだけ入れれば精度が上がります。</p>
      </div>
    </div>

    <div class="regenerate-bar" id="regenBar" style="display:none">
      <button class="regen-btn" onclick="generateColumn()">↺ 再生成</button>
      <button class="regen-btn" onclick="generateColumn('shorter')">もっと短く</button>
      <button class="regen-btn" onclick="generateColumn('longer')">もっと長く</button>
    </div>
  </div>
</div>

<script>
let targetLength = 900;
let currentTitle = '';
let currentBody = '';

const SAMPLE_COLUMNS = [
  "一生賃貸暮らしはないよね、と思いつつ、とはいえ仕事や家族構成が変わるかもしれないし、多額のローンを背負うのはちょっと違うかも。みたいな方に、ちょっと都心から距離をおくことで、無理のない負担で結構リアルな選択肢が手に入るかも？という物件のご提案。    田園都市線で渋谷から揺られること約20分の場所にある梶が谷駅から歩くこと7分。一人暮らし〜DINKSにハマりの良さそうな1LDKの間取り。    表記では約11.2帖ながら寝室との間仕切りをガラス建具にしているためかなり開放的な印象のあるリビング。長方形の形が使い勝手よくて、リビングとダイニングそれぞれゆったりと確保できます。",
  "目黒区に富士山があることをご存知でしょうか？    246号線の大橋の信号から氷川神社へと上がる階段の脇に、「目黒富士登山口」なる標識があります。    この登山口から1分弱の登山を開始すると、みるみるうちに三合目、五合目、そして「目黒富士山頂上」の標識が。    日々、帰宅の度に得られる頂上での達成感。そうです、このアパート、この頂上に立つ氷川神社の境内にあるのです。    ということはもちろん、窓の外にはワッサワッサと緑VIEW。246号線からはかなり上ったおかげで騒音は気にならず、落ち着く住環境。    いわゆる木造賃貸アパートなので、室内に過度な期待は禁物ですが、色々とリフォームされているため室内はきれいな印象。    くれぐれも、木造アパートであることはご了承下さい。お隣に来客があれば、談笑する声が聞こえてくることは普通にあります。    どちらかといえば女性より男性におすすめしやすいかも？と思いつつ、なぜか女性に借りていただけることが多い物件です。    木造アパートに抵抗ない方は、ぜひ。",
  "エントランスホールでは音楽が流れ、まるでホテルのような雰囲気で迎えられる赤茶色の重厚感のあるマンションの一室。    リビングのドアを開けると目に飛び込んでくるのはRがかった2つのカウンター。曲線に誘導されるようにバルコニーへと視線をやると、緑豊かな街並みと、遠くには新宿副都心のビル群が臨めます。    管理体制のよいマンションで、夜間は警備員さんが365日常駐とセキュリティ面も安心です。またリノベマンションで数少ないペット飼育可能な物件というのもうれしいポイント。    まるでホテルに泊まるように暮らす都心居住。グッと来た方はぜひ。",
  "大岡山の閑静な住宅街に立つ、YouTubeで話題の一級建築士事務所、ビーフンデザインの設計による小さな集合住宅。    無垢フローリングと白壁でシンプルにまとめた空間は、大きなワンルームながらゾーンごとに役割を与えられ、どこになにを配置すればいいのか悩まない間取りです。    こうしたデザイン性の高い物件には無機質な印象のものが多い中、この物件には温かみがあり、以前他の部屋を募集した際には特に女性に大人気でした。    カップルでも十分にお住まいいただける広さがありますので、二人暮らしにもぜひ。",
  "オーストラリア大使館やイタリア大使館をはじめ、各国の大使館が集まることから国際色豊かな街と知られる麻布十番にできた、一人暮らし〜三人家族くらいまでにおすすめのリノベ済みマンション。    東南角部屋につき窓が多く、気持ちの良い光と風が入ってきます。リビング正面の窓の先には通りの樹木が見え、その先はお隣のマンションの駐車場につき、スッと抜けた眺望が開けています。    一人暮らし、DINKS、ファミリーとフォーメーションが変わっても、間取りがちゃんとついてきてくれる。",
  "六本木駅2分という好立地に建つ、2010年に一棟丸ごとリノベーションにより生まれ変わったこのオフィス。    ざっくりと配管剥き出しの天井を塗装し、床はナラ材の無垢フローリング。シンプルな空間はどんな業種にも合いそう。    六本木と聞くとどうしても猥雑な空間をイメージしますが、この物件はシンプル、ナチュラル、至って快適。このギャップが一番の魅力だと思います。    しつこいようですが、駅からのこの至近距離は、日々ありがたみを感じられるポイントだと思います。",
  "◆　賃料が下がりました！　◆    紅葉した桜の木の脇を、ちょろちょろと小川が流れる、ほのぼのとした緑道。そんな癒しの空間を目の前に、こちらの物件は立っています。    まず緑道から部屋へのアプローチが、もう素敵。戦前のものだという立派な門から入り、飛び石の小道を数歩進むと、玄関へたどり着きます。    環境的にも物件的にも、「井の頭線沿いらしい暮らし」を探している方に合いそうです。"
];

function buildSystemPrompt() {
  const examples = SAMPLE_COLUMNS.slice(0, 6).join('\n\n---\n\n');
  return `あなたは不動産仲介会社「ホビー不動産」の代表、室田啓介の文体でコラムを書くライターです。
室田さんは東京R不動産で18年のキャリアを持ち、「不動産をホビーに」をコンセプトに活動しています。

【室田啓介の文体ルール】
- 一人称は「僕」
- 会話口調で、でも軽すぎない。読者と一緒に物件を楽しむような温度感
- 物件の「惚れポイント」を最初か早い段階で読者に体験させる
- 素材名・寸法・具体的な体感を使って描写する（「緑と空がちょうど半々に見える」「ソファに腰掛けると」など）
- ネックは正直に書くが、ポジティブに転換するか、そのまま受け入れてもらう形で書く
- 「どんな人向きか」は決めつけすぎず、でも具体的に
- 街の話は個人的なエピソードや発見を交えて
- 締め方は「〜な方はぜひ」「グッと来た方はぜひ」などシンプルに
- 段落は短め。一段落2〜4文くらい
- タイトルは物件の本質を掴んだキャッチコピー（例：「目黒富士山頂アパート！？」「だって、西荻だもの」「合板×合板×合板」）

【文体サンプル（過去の実際のコラム）】
${examples}

【生成ルール】
- タイトルと本文を生成する
- タイトルは1行のみ（「タイトル：」というラベルをつけて）
- 本文の前に「本文：」というラベルをつけて
- タイトルと本文の間に空行を1行入れる
- 指定文字数はあくまで目安。内容に合わせて±15%は許容
- 価格や条件の羅列はしない（コラムはあくまで読み物として書く）
- 「〜でしょうか？」「〜ではないかと思います」など疑問・推量で読者に問いかけるスタイルを適度に使う`;
}

function buildUserPrompt(overrideLengthMode) {
  const type = document.getElementById('type').value;
  const area = document.getElementById('area').value;
  const layout = document.getElementById('layout').value;
  const age = document.getElementById('age').value;
  const price = document.getElementById('price').value;
  const appeal = document.getElementById('appeal').value;
  const interior = document.getElementById('interior').value;
  const view = document.getElementById('view').value;
  const layout_idea = document.getElementById('layout_idea').value;
  const area_note = document.getElementById('area_note').value;
  const drawback = document.getElementById('drawback').value;
  const target = document.getElementById('target').value;

  let length = targetLength;
  if (overrideLengthMode === 'shorter') length = Math.max(500, targetLength - 300);
  if (overrideLengthMode === 'longer') length = Math.min(1500, targetLength + 300);

  let prompt = `以下の物件情報をもとに、室田さんらしいコラムを${length}字前後で書いてください。\n\n`;
  prompt += `【物件情報】\n`;
  if (type) prompt += `種別：${type}\n`;
  if (area) prompt += `エリア・駅：${area}\n`;
  if (layout) prompt += `間取り・面積：${layout}\n`;
  if (age) prompt += `築年数・構造：${age}\n`;
  if (price) prompt += `価格・賃料：${price}\n`;

  prompt += `\n【コラムのコア素材】\n`;
  if (appeal) prompt += `惚れポイント：${appeal}\n`;
  if (interior) prompt += `内装・空間：${interior}\n`;
  if (view) prompt += `眺望・環境：${view}\n`;
  if (layout_idea) prompt += `間取りの面白さ：${layout_idea}\n`;
  if (area_note) prompt += `街・エリア：${area_note}\n`;
  if (drawback) prompt += `ネック：${drawback}\n`;
  if (target) prompt += `向いている人：${target}\n`;

  return prompt;
}

function setLength(btn) {
  document.querySelectorAll('.length-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  targetLength = parseInt(btn.dataset.val);
}

async function generateColumn(overrideLengthMode) {
  const type = document.getElementById('type').value;
  const appeal = document.getElementById('appeal').value;

  if (!type && !appeal) {
    document.getElementById('outputBox').innerHTML = '<div class="error-msg">「物件種別」と「惚れポイント」は必須です。入力してから生成してください。</div>';
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '生成中...';
  document.getElementById('copyBtn').style.display = 'none';
  document.getElementById('charCountHeader').textContent = '';
  document.getElementById('regenBar').style.display = 'none';

  document.getElementById('outputBox').innerHTML = `
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  `;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        system: buildSystemPrompt(),
        messages: [{ role: 'user', content: buildUserPrompt(overrideLengthMode) }]
      })
    });

    const data = await response.json();
    const text = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : (data.error ? '【エラー】' + data.error.message : '');

    // Parse title and body
    const titleMatch = text.match(/タイトル[：:]\s*(.+)/);
    const bodyMatch = text.match(/本文[：:]\s*([\s\S]+)/);

    currentTitle = titleMatch ? titleMatch[1].trim() : '';
    currentBody = bodyMatch ? bodyMatch[1].trim() : text;
    if (!currentBody) currentBody = text;
    const charCount = (currentTitle + currentBody).length;

    let html = '';
    if (currentTitle) {
      html += `<div class="result-title">${escHtml(currentTitle)}</div>`;
    }
    html += `<div class="result-body">${escHtml(currentBody)}</div>`;
    html += `<div class="char-count">${charCount}字</div>`;

    document.getElementById('outputBox').innerHTML = html;
    document.getElementById('charCountHeader').textContent = `${charCount}字`;
    document.getElementById('copyBtn').style.display = 'block';
    document.getElementById('regenBar').style.display = 'flex';

  } catch (err) {
    document.getElementById('outputBox').innerHTML = `<div class="error-msg">エラーが発生しました。しばらく待ってから再試行してください。<br><small>${err.message}</small></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'コラムを生成する';
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function copyText() {
  const text = (currentTitle ? currentTitle + '\n\n' : '') + currentBody;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
